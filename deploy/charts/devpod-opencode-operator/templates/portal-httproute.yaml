{{- if .Values.portal.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "devpod-opencode-operator.fullname" . }}-portal
  namespace: {{ include "devpod-opencode-operator.namespace" . }}
  labels:
    {{- include "devpod-opencode-operator.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: {{ .Values.operator.gatewayName }}
      namespace: {{ .Values.operator.gatewayNamespace }}
  hostnames:
    - {{ .Values.portal.hostname | default .Values.operator.baseDomain | quote }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: {{ include "devpod-opencode-operator.fullname" . }}-portal
          port: 80
{{- end }}
