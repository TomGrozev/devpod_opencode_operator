apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "devpod-opencode-operator.fullname" . }}-config
  namespace: {{ include "devpod-opencode-operator.namespace" . }}
  labels:
    {{- include "devpod-opencode-operator.labels" . | nindent 4 }}
data:
  base-domain: {{ .Values.operator.baseDomain | quote }}
  target-namespace: {{ .Values.operator.targetNamespace | quote }}
  default-port: {{ .Values.operator.defaultPort | quote }}
  gateway-name: {{ .Values.operator.gatewayName | quote }}
  gateway-namespace: {{ .Values.operator.gatewayNamespace | quote }}
  workspace-label: {{ .Values.operator.workspaceLabel | quote }}
