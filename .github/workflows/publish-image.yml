# Publishes the Docker image to GitHub Container Registry (ghcr.io) on tag pushes.
# Only runs when the pushed tag points to a commit reachable from origin/master.
# Builds linux/amd64 only; add arm64 to the platforms list if needed.

name: Publish Docker Image

on:
  push:
    tags: ['*']

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    name: Build & Push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check tag points to master
        run: |
          git fetch origin master
          TAG_SHA=$(git rev-parse "$GITHUB_SHA")
          if ! git merge-base --is-ancestor "$TAG_SHA" origin/master; then
            echo "Tag commit $TAG_SHA is not reachable from origin/master — skipping."
            exit 0
          fi
          echo "Tag commit is on master — proceeding."

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/tomgrozev/devpod_opencode_operator:${{ github.ref_name }}
            ghcr.io/tomgrozev/devpod_opencode_operator:latest
            ghcr.io/tomgrozev/devpod_opencode_operator:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
