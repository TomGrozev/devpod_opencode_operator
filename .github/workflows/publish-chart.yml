# Publishes the Helm chart to GitHub Container Registry (ghcr.io) as an OCI artifact
# on tag pushes matching `chart-v*`. Only runs when the pushed tag points to a
# commit reachable from origin/master. The published OCI tag is the chart's
# `version` field from Chart.yaml (e.g. tag `chart-v0.2.1` → OCI tag `0.2.1`).

name: Publish Helm Chart

on:
  push:
    tags: ['chart-v*']

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-chart-${{ github.ref }}
  cancel-in-progress: true

jobs:
  package-and-push:
    name: Package & Push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check tag points to master
        run: |
          git fetch origin master
          TAG_SHA=$(git rev-parse "$GITHUB_SHA")
          if ! git merge-base --is-ancestor "$TAG_SHA" origin/master; then
            echo "Tag commit $TAG_SHA is not reachable from origin/master — skipping."
            exit 0
          fi
          echo "Tag commit is on master — proceeding."

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v4.2.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Package chart
        run: |
          helm package deploy/charts/devpod-opencode-operator --destination dist

      - name: Push chart to OCI
        run: |
          # Push to a repo-scoped OCI path. The resulting GHCR package lives at
          # /repos/<owner>/<repo>/packages/container/<chart-name> and is owned by
          # this repository, so the workflow's GITHUB_TOKEN (with packages: write)
          # can manage its visibility. Helm 4 appends the chart name from Chart.yaml
          # to the URL path, so the final package reference is
          # oci://ghcr.io/<owner>/<repo>/<chart-name>.
          # See: https://helm.sh/docs/topics/registries/
          CHART_TGZ=$(ls dist/*.tgz | head -n1)
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "Pushing $CHART_TGZ to oci://ghcr.io/${REPO_LOWER}"
          helm push "$CHART_TGZ" "oci://ghcr.io/${REPO_LOWER}"

      - name: Make package public
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Helm chart packages end up under the 'container' package_type on ghcr.io.
          # Visibility defaults to private; flip it to public so Flux OCIRepository
          # can pull anonymously.
          #
          # GHCR quirk for personal accounts: even though we push to a repo-scoped
          # OCI URL (oci://ghcr.io/<owner>/<repo>/<chart-name>), the resulting
          # package is stored under the *user* account (not under the repo). The
          # package's GHCR name is the full path-with-slash: "<repo>/<chart-name>",
          # which appears URL-encoded as %2F in REST API paths. The repo-level
          # REST endpoint (/repos/...) does not exist for personal accounts and
          # 404s — we must use the user-level one with the slash encoded.
          OWNER_LOWER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          REPO_NAME_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]' | cut -d/ -f2)
          gh api -X PATCH -H "Accept: application/vnd.github+json" \
            "/users/${OWNER_LOWER}/packages/container/${REPO_NAME_LOWER}%2Fdevpod-opencode-operator" \
            -f visibility=public
